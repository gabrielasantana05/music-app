<!DOCTYPE html>
<html lang="en">

</head>

<body>
   <header class="site-header">
    <div class="logo">SoundWave</div>
    <nav class="nav-bar">
      <a href="home.html">Home</a>
      <a href="ai.html">Discover</a>
      <a href="plans.html">Plans</a>
    </nav>
  </header>
  
<section class="plans-section" id="Plans">
  <h2>Choose Your Plan</h2>

  <div class="plans-container">

    <div class="plan-card" onclick="openPlan('Student Premium', '$2.99/month')">
      <h3> 🎓 Student</h3>
      <p>No ads, unlimited skips, playlists</p>
      <p>$2.99/mo</p>
    </div>

    
    <div class="plan-card" onclick="openPlan('Basic Premium', '$4.99/month')">
      <h3> 🔥 Basic</h3>
      <p>No ads, better audio, recommendations</p>
      <p>$4.99/mo</p>
    </div>


    <div class="plan-card" onclick="openPlan('Premium Plus', '$7.99/month')">
      <h3> 💎 Premium+</h3>
      <p>No ads, offline mode, best quality</p>
      <p>$7.99/mo</p>
    </div>

     </div>
</section>

  <div id="popup" class="popup">
  <div class="popup-content">
    <h2 id="title"></h2>
    <p id="price"></p>

    <button onclick="confirmPlan()">Confirm</button>
    <button onclick="closePopup()">Go Back</button>
  </div>
</div>

<script src="plans.js"></script>

</body>
</html>
