<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css"/>
          <link rel="stylesheet" href="ai.html"/>
    <title>Document</title>
</head>
<body>
<header class="site-header">
    <div class="logo">SoundWave</div>
    <nav class="nav-bar">
      <a href="home.html">Home</a>
      <a href="#">Discover</a>
      <a href="plans.html">Plans</a>
    </nav>
  </header>

<div class="chat-wrapper">

  <div class="chat-title">
    AI CHAT
  </div>

  <form id="ai-form">
    <div class="chat-input">
      <input type="number" id="age" placeholder="Your age..." min="1" max="120" required>
    </div>

    <div class="chat-input">
      <input type="text" id="mood" placeholder="How are you feeling today?..." required>
      <button id="submit-btn" type="submit">➤</button>
    </div>
  </form>

  <div id="loading-section" style="display:none; text-align:center; color:#000; margin-top:16px;">
    <p>🎶 Finding the best music for you...</p>
  </div>

  <div id="result-section" style="display:none; margin-top:20px; background:#f9f9f9; border-radius:10px; padding:16px; box-sizing:border-box; overflow-wrap:break-word; word-break:break-word; max-height:350px; overflow-y:auto; color:#111; line-height:1.8;">
    <div id="result-content"></div>
  </div>

</div>

<script type="module" src="config.js"></script>
<script type="module" src="ai.js"></script>

</body>
</html>
